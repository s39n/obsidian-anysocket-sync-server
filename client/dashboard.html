<!DOCTYPE html>
<html>
<head>
    <title>Anysocket Sync Server Dashboard</title>
    <style>
        :root { --accent: #007bff; --text-dim: #64748b; --border: #ccc; }
        body { font-family: sans-serif; padding: 20px; background-color: #f8fafc; }
        .peer { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; background: white; }
        .actions { margin-top: 10px; }
        button { margin-right: 5px; padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; }
        .danger { color: white; background: #cc0000; border: none; }
        
        /* Grid Styles */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 10px;
        }
        .file-item-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: all 0.2s;
        }
        .file-item-card:hover {
            border-color: var(--accent);
            background: #f1f5f9;
        }
        .file-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
        .file-name { font-size: 0.75rem; word-break: break-all; display: block; height: 32px; overflow: hidden; }
        .file-checkbox-overlay { position: absolute; top: 8px; left: 8px; }
        
        /* View Toggle Buttons */
        .view-controls button { background: transparent; border: none; color: var(--text-dim); font-size: 1.2rem; padding: 5px; }
        .view-controls button.active { color: var(--accent); }
    </style>
</head>
<body>
    <h1>AnySocket Sync Server Dashboard</h1>
    <h2>Connected Peers</h2>
    <div id="peers">Loading peers...</div>
    
    <div id="logs" style="margin-top:20px;">
        <h3>Server Logs</h3>
        <pre id="logContent" style="background: #e2e8f0; padding: 10px; height: 150px; overflow-y: scroll; border-radius: 5px;"></pre>
    </div>

    <section class="file-card" style="margin-top:20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h3>Synced Files</h3>
                <div class="view-controls">
                    <button id="listBtn" onclick="setView('list')">≡</button>
                    <button id="gridBtn" onclick="setView('grid')" class="active">⊞</button>
                </div>
            </div>
            <button onclick="deleteSelected()" class="danger">Delete Selected</button>
        </div>
        
        <input type="text" id="fileSearch" placeholder="Search filenames..." onkeyup="filterFiles()" style="width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box;">
        
        <div id="fileContainer" class="file-grid" style="height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: #fff;">
        </div>
    </section>

    <script>
        let allFiles = [];
        let currentView = 'grid';

        async function fetchPeers() {
            const container = document.getElementById('peers');
            const res = await fetch('/api/peers');
            const peers = await res.json();
            container.innerHTML = '';
            peers.forEach(p => {
                const div = document.createElement('div');
                div.className = 'peer';
                div.innerHTML = `
                    <strong>Device:</strong> ${p.data.id || 'Unknown'}<br>
                    <strong>ID:</strong> ${p.id}<br>
                    <strong>Last Seen:</strong> ${p.lastOnline ? new Date(p.lastOnline).toLocaleString() : 'N/A'}<br>
                    <div class="actions">
                        <button onclick="performAction('disconnect', '${p.id}')">Disconnect</button>
                        <button onclick="performAction('trigger-sync', '${p.id}')">Trigger Sync</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        async function performAction(action, peerId) {
            await fetch(`/api/action/${action}/${peerId}`);
            fetchPeers();
        }

        async function loadLogs() {
            const res = await fetch('/api/logs');
            if (res.ok) document.getElementById('logContent').innerText = await res.text();
            else document.getElementById('logContent').innerText = "Logs not found.";
        }

        async function loadFiles() {
            const res = await fetch('/api/files');
            allFiles = await res.json();
            renderFiles(allFiles);
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️',
                mp4: '🎬', mov: '🎬',
                zip: '📦', rar: '📦',
                txt: '📝', doc: '📝', docx: '📝'
            };
            return icons[ext] || '📁';
        }

        function setView(view) {
            currentView = view;
            document.getElementById('listBtn').classList.toggle('active', view === 'list');
            document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
            document.getElementById('fileContainer').className = view === 'grid' ? 'file-grid' : '';
            renderFiles(allFiles);
        }

        function renderFiles(files) {
            const container = document.getElementById('fileContainer');
            if (currentView === 'grid') {
                container.innerHTML = files.map(f => `
                    <div class="file-item-card">
                        <input type="checkbox" class="fileCheckbox file-checkbox-overlay" value="${encodeURIComponent(f.path)}">
                        <span class="file-icon">${getFileIcon(f.path)}</span>
                        <span class="file-name">${f.path}</span>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 2px solid #ccc;">
                                <th style="padding: 10px;"></th>
                                <th style="padding: 10px;">Name</th>
                                <th style="padding: 10px;">Size</th>
                                <th style="padding: 10px;">Modified</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${files.map(f => `
                                <tr style="border-bottom: 1px solid #eee;">
                                    <td style="padding: 10px;"><input type="checkbox" class="fileCheckbox" value="${encodeURIComponent(f.path)}"></td>
                                    <td style="padding: 10px;">${f.path}</td>
                                    <td style="padding: 10px;">${(f.size / 1024).toFixed(1)} KB</td>
                                    <td style="padding: 10px;">${new Date(f.mtime).toLocaleString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            }
        }

        function filterFiles() {
            const query = document.getElementById('fileSearch').value.toLowerCase();
            renderFiles(allFiles.filter(f => f.toLowerCase().includes(query)));
        }

        async function deleteSelected() {
            const selected = Array.from(document.querySelectorAll('.fileCheckbox:checked')).map(cb => cb.value);
            if(selected.length === 0) return alert("Select at least one file");
            if(!confirm("Are you sure you want to delete " + selected.length + " files?")) return;
            
            for(const path of selected) {
                await fetch(`/api/delete-file/${path}`);
            }
            alert("Delete operations complete");
            loadFiles();
        }

        fetchPeers();
        loadLogs();
        loadFiles();
        setInterval(fetchPeers, 5000);
    </script>
</body>
</html>
