<!DOCTYPE html>
<html>
<head>
    <title>Anysocket Sync Server Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .peer { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .actions { margin-top: 10px; }
        button { margin-right: 5px; padding: 5px 10px; cursor: pointer; }
        .danger { color: white; background: #cc0000; border: none; }
    </style>
</head>
<body>
    <h1>AnySocket Sync Server Dashboard</h1>
    <h2>Connected Peers</h2>
    <div id="peers">Loading peers...</div>
    <script>
        async function fetchPeers() {
            const container = document.getElementById('peers');
            const res = await fetch('/api/peers');
            const peers = await res.json();
            container.innerHTML = '';
            peers.forEach(p => {
                const div = document.createElement('div');
                div.className = 'peer';
                div.innerHTML = `
                    <strong>Device:</strong> ${p.data.id || 'Unknown'}<br>
                    <strong>ID:</strong> ${p.id}<br>
                    <div class="actions">
                        <button onclick="performAction('disconnect', '${p.id}')">Disconnect</button>
                        <button onclick="performAction('trigger-sync', '${p.id}')">Trigger Sync</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        async function performAction(action, peerId) {
            await fetch(`/api/action/${action}/${peerId}`);
            fetchPeers();
        }
        fetchPeers();
        setInterval(fetchPeers, 5000);
    </script>
</body>
</html>
