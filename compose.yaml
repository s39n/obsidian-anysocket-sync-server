services:
  sync-server:
    build: .             # <--- (tells Docker to use your Dockerfile)
    working_dir: /app
    volumes:
      - ./config.js:/app/config.js
      - ./data:/app/data
    environment:
      - PORT=3000
      - AUTH_TOKEN=${AUTH_TOKEN} # <--- (!Chanage to your own setup!)
    command: npm start
    ports:
      - "3777:3000" # <--- (!Chanage 3777 to your own setup!)
