services:
  sync-server:
    image: node:alpine
    working_dir: /app
    user: "1000:100"
    volumes:
      - /share/Docker/AnySocket/data:/app/dat
    environment:
      - PORT=3000
      - AUTH_TOKEN=${AUTH_TOKEN}
    command: >
      sh -c "echo '{\"port\": 3000, \"token\": \"$AUTH_TOKEN\"}' > config.json && 
             npm start"
    ports:
      - "3777:3000"
